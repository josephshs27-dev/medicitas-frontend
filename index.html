<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCitas Pro - Portal de Acceso</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-src *; img-src * data: blob:; font-src * data:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center p-4 selection:bg-blue-500 selection:text-white">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <p class="text-white font-bold text-xl animate-pulse">Iniciando sesión...</p>
        <p class="text-slate-400 text-sm mt-2" id="redirectMsg">Verificando tu especialidad médica</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md animate-slideIn">
        
        <div class="text-center mb-8">
            <span class="text-6xl mb-4 block">🏥</span>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">MediCitas Pro</h2>
            <p class="text-slate-500 font-medium mt-1">Gestión Médica con Inteligencia Artificial</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Email Profesional</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-slate-50">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-slate-50">
            </div>
            <button type="submit" id="btnSubmitLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg active:scale-95 text-lg mt-2">Ingresar al Sistema</button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-100" id="boxToggleSignup">
            <button id="toggleSignupBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-colors">Crear Nueva Cuenta Clínica</button>
        </div>

        <div id="signupForm" class="hidden mt-6 space-y-4 pt-6 border-t border-slate-100">
            <h3 class="text-xl font-black text-slate-800 mb-2">Registro de Especialidad</h3>
            
            <input type="text" id="signupName" placeholder="Nombre del Doctor o Clínica" class="w-full px-4 py-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="email" id="signupEmail" placeholder="Email Profesional" class="w-full px-4 py-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="signupPassword" placeholder="Crea una contraseña segura" class="w-full px-4 py-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="tel" id="signupPhone" placeholder="Teléfono / WhatsApp (099...)" class="w-full px-4 py-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                <label class="block text-xs font-bold text-indigo-800 mb-1 ml-1">Selecciona tu Especialidad Base</label>
                <select id="signupSpecialty" class="w-full px-3 py-2 border border-indigo-200 rounded-lg bg-white font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm text-sm">
                    <option value="medicina">Medicina General / Especialidades</option>
                    <option value="odontologia">Clínica Odontológica</option>
                    <option value="veterinaria">Centro Veterinario</option>
                    <option value="fisioterapia">Fisioterapia y Rehabilitación</option>
                    <option value="nutricion">Nutrición y Dietética</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">Vendedor / Referido (Opcional)</label>
                <select id="signupVendedor" class="w-full px-4 py-3 border rounded-xl bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Compra directa en web</option>
                </select>
            </div>

            <div class="flex gap-3 mt-4">
                <button type="button" id="toggleBackBtn" class="w-1/3 bg-slate-200 text-slate-700 hover:bg-slate-300 font-bold py-3 rounded-xl transition-colors">Volver</button>
                <button type="button" id="submitSignupBtn" class="w-2/3 bg-green-600 text-white hover:bg-green-700 font-bold py-3 rounded-xl shadow-md transition-all active:scale-95">Completar Registro</button>
            </div>
        </div>

        <div id="authError" class="mt-4 p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl hidden text-sm font-bold text-center"></div>
        
        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-xs text-slate-400 mb-2">Al iniciar sesión o registrarte, aceptas nuestras políticas.</p>
            <a href="privacidad.html" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm font-bold underline transition-colors">Política de Privacidad y Términos</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpZDqGMKLOiqUOXSs84BQcXHEBYyqTDfc", 
            authDomain: "medicitas-app.firebaseapp.com",
            projectId: "medicitas-app", 
            storageBucket: "medicitas-app.firebasestorage.app",
            messagingSenderId: "310910036460", 
            appId: "1:310910036460:web:1a979471880251173838c9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Normalizar teléfonos a formato internacional (593)
        function normalizarTelefono(phone) {
            if (!phone) return '';
            let cleaned = String(phone).replace(/\D/g, ''); 
            if (cleaned.startsWith('593')) return cleaned;
            if (cleaned.startsWith('09') && cleaned.length === 10) return '593' + cleaned.substring(1);
            if (cleaned.startsWith('9') && cleaned.length === 9) return '593' + cleaned;
            return cleaned; 
        }

        // ====================================================
        // 🔥 ENRUTADOR INTELIGENTE (LA MAGIA DE REDIRECCIÓN) 🔥
        // ====================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Prender pantalla de carga
                document.getElementById('loadingOverlay').classList.remove('hidden');
                
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    
                    if (userDoc.exists) {
                        const data = userDoc.data();
                        
                        // Si es VENDEDOR
                        if (data.rol === 'vendedor') { 
                            window.location.href = 'vendedor.html'; 
                            return; 
                        }

                        // Si es DOCTOR, buscamos su especialidad
                        let especialidad = 'medicina'; // Default de seguridad
                        if (data.clinicInfo && data.clinicInfo.especialidad) {
                            especialidad = data.clinicInfo.especialidad;
                        }

                        // Informar al usuario a dónde va
                        document.getElementById('redirectMsg').textContent = `Abriendo módulo especializado de ${especialidad.toUpperCase()}...`;

                        // Mapeo seguro de URLs
                        const rutasPermitidas = {
                            'medicina': 'dashboard-medicina.html',
                            'odontologia': 'dashboard-odontologia.html',
                            'veterinaria': 'dashboard-veterinaria.html',
                            'fisioterapia': 'dashboard-fisioterapia.html',
                            'nutricion': 'dashboard-nutricion.html'
                        };

                        const urlDestino = rutasPermitidas[especialidad] || 'dashboard-medicina.html';

                        // Redirigir (Con un pequeño timeout estético para que se lea el mensaje)
                        setTimeout(() => { window.location.href = urlDestino; }, 800);

                    } else {
                        // Error si no tiene documento en la base de datos
                        auth.signOut();
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        mostrarError("Error: Perfil no encontrado en la base de datos.");
                    }
                } catch (e) {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    mostrarError("Fallo de conexión con el servidor.");
                }
            }
        });

        // ====================================================
        // LÓGICA DE INICIO DE SESIÓN
        // ====================================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitLogin');
            btn.innerHTML = '<div class="spinner w-6 h-6 border-2 mx-auto"></div>';
            btn.disabled = true;

            try {
                await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
                // Si es exitoso, el onAuthStateChanged toma el control y redirige automáticamente
            } catch (error) { 
                btn.innerHTML = 'Ingresar al Sistema';
                btn.disabled = false;
                mostrarError("Correo o contraseña incorrectos."); 
            }
        });

        // ====================================================
        // LÓGICA DE REGISTRO
        // ====================================================
        document.getElementById('toggleSignupBtn').onclick = () => {
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('boxToggleSignup').classList.add('hidden');
            loadSellers();
        };

        document.getElementById('toggleBackBtn').onclick = () => {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('boxToggleSignup').classList.remove('hidden');
        };

        async function loadSellers() {
            try {
                const vendSnap = await db.collection('users').where('rol', '==', 'vendedor').get();
                let html = '<option value="">Compra directa en web (Sin vendedor)</option>';
                vendSnap.forEach(doc => { html += `<option value="${doc.id}">Referido por: ${doc.data().nombre}</option>`; });
                document.getElementById('signupVendedor').innerHTML = html;
            } catch(e) { console.log("Error cargando vendedores", e); }
        }

        document.getElementById('submitSignupBtn').onclick = async () => {
            const btn = document.getElementById('submitSignupBtn');
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPassword').value.trim();
            const phone = normalizarTelefono(document.getElementById('signupPhone').value.trim());
            
            // Capturar la especialidad seleccionada
            const especialidad = document.getElementById('signupSpecialty').value; 
            const vendedorId = document.getElementById('signupVendedor').value;

            if (!name || !email || !pass || !phone) return mostrarError("Por favor, completa todos los campos requeridos.");
            
            btn.innerHTML = '⏳ Registrando...';
            btn.disabled = true;

            try {
                // 1. Crear el usuario en Firebase Authentication
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                
                // Asignar colores por defecto según la especialidad para mantener la estética
                let colorBase = '#2563eb'; // Medicina
                if(especialidad === 'odontologia') colorBase = '#0e7490';
                if(especialidad === 'veterinaria') colorBase = '#4338ca';
                if(especialidad === 'fisioterapia') colorBase = '#0f766e';
                if(especialidad === 'nutricion') colorBase = '#047857';

                // 2. Crear su perfil en Firestore con la especialidad correcta
                await db.collection('users').doc(cred.user.uid).set({
                    userId: cred.user.uid, 
                    nombre: name, 
                    email: email, 
                    telefonoWhatsApp: phone,
                    rol: 'doctor', 
                    estadoSuscripcion: 'suspendido', // Nace suspendido hasta que pague
                    precioSuscripcion: 20, 
                    fechaRegistro: new Date(),
                    vendedorId: vendedorId || null,
                    clinicInfo: { 
                        nombre: name, 
                        telefono: phone, 
                        especialidad: especialidad, // 🔥 AQUÍ SE GUARDA LA ESPECIALIDAD QUE LO ENRUTARÁ DE POR VIDA
                        color: colorBase
                    }
                });
                
                // 3. Forzar redirección al portal de pagos
                window.location.href = 'pagos.html';

            } catch (e) { 
                mostrarError("Error en el registro: " + e.message); 
                btn.innerHTML = 'Completar Registro';
                btn.disabled = false; 
            }
        };

        function mostrarError(msg) {
            const d = document.getElementById('authError');
            d.textContent = msg; 
            d.classList.remove('hidden');
            setTimeout(() => d.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
