<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Coexistencia WhatsApp - Asistencitas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f6f8;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <h1>Prueba de Registro Integrado (Embedded Signup por URL)</h1>
    <p>Haz clic para abrir el asistente oficial de Meta sin errores de SDK.</p>
    <br>
    
    <!-- Botón que redirige de forma nativa -->
    <button class="btn-whatsapp" onclick="launchWhatsAppDirect()">Conectar WhatsApp Business</button>

    <script>
        function launchWhatsAppDirect() {
            // Reemplaza con tu App ID real de Facebook Developers
            const appId = '2479673065791422'; 
            
            // Reemplaza con el ID de configuración que creamos en el panel
            const configId = '1020182057736220'; 
            
            // La URL de redirección actual (puede ser localhost o tu dominio de pruebas)
            const redirectUri = window.location.href.split('?')[0];

            // Construimos la URL oficial del Embedded Signup de Meta
            const fbLoginUrl = `https://www.facebook.com/v18.0/dialog/oauth?client_id=${appId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&scope=whatsapp_business_management,whatsapp_business_messaging&config_id=${configId}&extras=${encodeURIComponent(JSON.stringify({ featureType: 'whatsapp_business_app_onboarding', sessionInfoVersion: '3' }))}`;

            // Redirigimos al usuario al flujo oficial de Meta
            window.location.href = fbLoginUrl;
        }
    </script>

</body>
</html>
