<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Coexistencia WhatsApp - Asistencitas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f6f8;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <h1>Prueba de Registro Integrado (Embedded Signup Oficial)</h1>
    <p>Haz clic en el botón para abrir el asistente mediante el SDK de Facebook.</p>
    <br>
    
    <button class="btn-whatsapp" onclick="launchWhatsAppSignup()">Conectar WhatsApp Business</button>

    <script>
        // Carga asíncrona oficial del SDK de Facebook
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '2479673065791422', // Reemplaza con tu App ID de Meta
                cookie     : true,
                xfbml      : true,
                version    : 'v18.0'
            });
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/es_LA/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function launchWhatsAppSignup() {
            if (typeof FB === 'undefined') {
                alert("El SDK aún está cargando. Espera un segundo.");
                return;
            }

            FB.login(function(response) {
                if (response.authResponse) {
                    const code = response.authResponse.code;
                    console.log("Código de autorización obtenido:", code);
                    alert("¡Conectado con éxito! Código obtenido en consola.");
                } else {
                    console.log('El usuario canceló el flujo.');
                }
            }, {
                config_id: '1020182057736220', // Tu ID de configuración de Meta
                response_type: 'code',           // 👈 ESTO ES LO QUE FALTABA Y SOLUCIONA EL ERROR
                override_default_response_type: true, // 👈 FUERZA A META A IGNORAR EL TOKEN POR DEFECTO
                extras: {
                    featureType: 'whatsapp_business_app_onboarding',
                    sessionInfoVersion: '3'
                }
            });
        }
