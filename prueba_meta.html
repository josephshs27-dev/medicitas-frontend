<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Coexistencia WhatsApp - Asistencitas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f6f8;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-whatsapp:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .btn-whatsapp:hover:not(:disabled) {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <h1>Prueba de Registro Integrado (Embedded Signup)</h1>
    <p id="estado-sdk">Cargando SDK de Facebook, por favor espera...</p>
    <br>
    
    <!-- Botón inicialmente bloqueado -->
    <button id="btn-conectar" class="btn-whatsapp" onclick="launchWhatsAppSignup()" disabled>Conectar WhatsApp Business</button>

    <script>
        // 1. Inicializar el SDK de Facebook correctamente al cargar la página
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '', // Puedes dejarlo vacío para pruebas locales con config_id
                cookie     : true,
                xfbml      : true,
                version    : 'v18.0'
            });

            // Una vez inicializado, habilitamos el botón y actualizamos el texto
            document.getElementById('btn-conectar').disabled = false;
            document.getElementById('estado-sdk').innerText = 'SDK listo. Ya puedes hacer clic.';
        };

        // Cargar el SDK de forma asíncrona
        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/es_LA/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        // 2. Función que lanza la ventana emergente con el parámetro correcto
        function launchWhatsAppSignup() {
            if (typeof FB === 'undefined') {
                alert("El SDK de Facebook aún no se ha cargado. Espera un segundo más.");
                return;
            }

            FB.login(function(response) {
                if (response.authResponse) {
                    const code = response.authResponse.code;
                    console.log("Código de autorización obtenido:", code);
                    alert("¡Autorización exitosa! Código obtenido en consola.");
                } else {
                    console.log('El usuario canceló el flujo o no autorizó.');
                }
            }, {
                config_id: '1020182057736220', // 👈 REEMPLAZA ESTO CON EL ID QUE COPIASTE DE META
                override_default_response_type: 'code',
                extras: {
                    featureType: 'whatsapp_business_app_onboarding',
                    sessionInfoVersion: '3'
                }
            });
        }
    </script>

</body>
</html>
