<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Coexistencia WhatsApp - Asistencitas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f6f8;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
        .error-favicon {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Prueba de Registro Integrado (Embedded Signup)</h1>
    <p>Haz clic en el botón para inicializar y lanzar el flujo de Meta directamente.</p>
    <br>
    
    <!-- Botón siempre activo -->
    <button class="btn-whatsapp" onclick="launchWhatsAppSignup()">Conectar WhatsApp Business</button>

    <div class="error-favicon">* Nota: El error de favicon.ico en la consola es solo estফtico (falta la imagen del ícono en tu PC) y no afecta en nada a la prueba.</div>

    <script>
        // Función autoejecutable para precargar el script de Facebook si no existe
        function loadSdk(callback) {
            if (typeof FB !== 'undefined') {
                callback();
                return;
            }
            
            window.fbAsyncInit = function() {
                FB.init({
                    appId      : '', // Vacío para pruebas locales con config_id
                    cookie     : true,
                    xfbml      : true,
                    version    : 'v18.0'
                });
                callback();
            };

            // Inyectar el script si no está cargado
            if (!document.getElementById('facebook-jssdk')) {
                var js, fjs = document.getElementsByTagName('script')[0];
                js = document.createElement('script'); js.id = 'facebook-jssdk';
                js.src = "https://connect.facebook.net/es_LA/sdk.js";
                fjs.parentNode.insertBefore(js, fjs);
            }
        }

        // Función que se ejecuta al hacer clic
        function launchWhatsAppSignup() {
            // Aseguramos que el SDK esté inicializado justo en el evento de clic
            loadSdk(function() {
                FB.login(function(response) {
                    if (response.authResponse) {
                        const code = response.authResponse.code;
                        console.log("Código de autorización obtenido:", code);
                        alert("¡Autorización exitosa! Código obtenido en consola.");
                    } else {
                        console.log('El usuario canceló el flujo o no autorizó.');
                    }
                }, {
                    config_id: '1020182057736220', // 👈 REEMPLAZA ESTO CON EL ID QUE COPIASTE DE META
                    override_default_response_type: 'code',
                    extras: {
                        featureType: 'whatsapp_business_app_onboarding',
                        sessionInfoVersion: '3'
                    }
                });
            });
        }
    </script>

</body>
</html>
